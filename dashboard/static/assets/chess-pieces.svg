<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ratspeak chess piece sprite.
  Original artwork licensed under AGPL-3.0-or-later alongside the project.
  12 symbols: w{p,n,b,r,q,k} (white) and b{p,n,b,r,q,k} (black).
  Each symbol renders on a 45x45 viewBox so pieces line up regardless of
  square size when referenced via <use href="#wp"/>.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <defs>
    <!-- Shared base plate used by every piece, stamped via <use> at the foot. -->
    <g id="ratspeak-chess-base">
      <rect x="9" y="35.5" width="27" height="3.5" rx="1"/>
      <ellipse cx="22.5" cy="40" rx="14.5" ry="2.2"/>
    </g>
  </defs>

  <!-- =============================== WHITE =============================== -->
  <symbol id="wp" viewBox="0 0 45 45">
    <g fill="#f6f5f1" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <circle cx="22.5" cy="13" r="5.5"/>
      <path d="M 17 18.5 L 28 18.5 L 31.5 32 L 13.5 32 Z"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="wr" viewBox="0 0 45 45">
    <g fill="#f6f5f1" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M 11 9 L 15 9 L 15 12 L 19 12 L 19 9 L 26 9 L 26 12 L 30 12 L 30 9 L 34 9 L 34 14 L 11 14 Z"/>
      <path d="M 13 14 L 32 14 L 30.5 17.5 L 14.5 17.5 Z"/>
      <path d="M 14.5 17.5 L 30.5 17.5 L 32 33 L 13 33 Z"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="wn" viewBox="0 0 45 45">
    <g fill="#f6f5f1" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Horse head facing right, Staunton-style silhouette. -->
      <!-- Path traces: ear tip → down front of ear → forehead → over brow → muzzle top → nose → mouth/lips → underside of muzzle → jaw → throat curve → front of chest → down to base → back up rear of body → neck back → mane top → ear back. -->
      <path d="M 22 8
               L 24 4
               L 27 8
               L 28 10
               Q 31 11, 33 14
               Q 36 17, 36 20
               L 35 22
               L 32 22
               L 31 24
               L 31 26
               L 27 26
               L 24 28
               Q 23 30, 26 31
               L 31 33
               L 32 35
               L 13 35
               L 13 30
               Q 9 26, 10 21
               Q 10 17, 13 15
               Q 13 10, 18 10
               Z"/>
      <!-- Mane: three tufts down the back of the neck -->
      <path d="M 18 10 Q 15 14, 14 18 Q 13 22, 15 26 Q 16 30, 19 33" fill="none" stroke-width="1.3"/>
      <!-- Eye -->
      <circle cx="25" cy="15" r="1" fill="#1a1a1a" stroke="none"/>
      <!-- Nostril -->
      <circle cx="33" cy="19" r="0.7" fill="#1a1a1a" stroke="none"/>
      <!-- Mouth slit -->
      <path d="M 32 24 L 34 24" stroke-width="0.8"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="wb" viewBox="0 0 45 45">
    <g fill="#f6f5f1" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <circle cx="22.5" cy="9" r="2.5"/>
      <path d="M 16 14 Q 22.5 11.5, 29 14 L 30 18 L 15 18 Z"/>
      <path d="M 15 18 L 30 18 L 32 32 L 13 32 Z"/>
      <!-- Mitre slit -->
      <path d="M 22.5 19 L 22.5 26" stroke-width="1.5" stroke="#1a1a1a"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="wq" viewBox="0 0 45 45">
    <g fill="#f6f5f1" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Five-point crown: balls + zig-zag band -->
      <circle cx="9" cy="8" r="1.8"/>
      <circle cx="15.5" cy="6" r="1.8"/>
      <circle cx="22.5" cy="5" r="1.8"/>
      <circle cx="29.5" cy="6" r="1.8"/>
      <circle cx="36" cy="8" r="1.8"/>
      <path d="M 9 9 L 13 16 L 15.5 8 L 19 16 L 22.5 7 L 26 16 L 29.5 8 L 32 16 L 36 9 L 34 19 L 11 19 Z"/>
      <path d="M 11 19 L 34 19 L 32 32 L 13 32 Z"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="wk" viewBox="0 0 45 45">
    <g fill="#f6f5f1" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Cross -->
      <path d="M 22.5 4 L 22.5 10 M 19.5 7 L 25.5 7" stroke-width="2"/>
      <!-- Crown base -->
      <path d="M 13 17 Q 18 11, 22.5 11 Q 27 11, 32 17 L 33 20 L 12 20 Z"/>
      <!-- Body -->
      <path d="M 12 20 L 33 20 L 32 32 L 13 32 Z"/>
      <!-- Belt -->
      <path d="M 13 25 L 32 25" stroke-width="1.2"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <!-- =============================== BLACK =============================== -->
  <symbol id="bp" viewBox="0 0 45 45">
    <g fill="#1a1a1a" stroke="#050505" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <circle cx="22.5" cy="13" r="5.5"/>
      <path d="M 17 18.5 L 28 18.5 L 31.5 32 L 13.5 32 Z"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="br" viewBox="0 0 45 45">
    <g fill="#1a1a1a" stroke="#050505" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M 11 9 L 15 9 L 15 12 L 19 12 L 19 9 L 26 9 L 26 12 L 30 12 L 30 9 L 34 9 L 34 14 L 11 14 Z"/>
      <path d="M 13 14 L 32 14 L 30.5 17.5 L 14.5 17.5 Z"/>
      <path d="M 14.5 17.5 L 30.5 17.5 L 32 33 L 13 33 Z"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="bn" viewBox="0 0 45 45">
    <g fill="#1a1a1a" stroke="#050505" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M 22 8
               L 24 4
               L 27 8
               L 28 10
               Q 31 11, 33 14
               Q 36 17, 36 20
               L 35 22
               L 32 22
               L 31 24
               L 31 26
               L 27 26
               L 24 28
               Q 23 30, 26 31
               L 31 33
               L 32 35
               L 13 35
               L 13 30
               Q 9 26, 10 21
               Q 10 17, 13 15
               Q 13 10, 18 10
               Z"/>
      <path d="M 18 10 Q 15 14, 14 18 Q 13 22, 15 26 Q 16 30, 19 33" fill="none" stroke="#f6f5f1" stroke-width="1.3"/>
      <circle cx="25" cy="15" r="1" fill="#f6f5f1" stroke="none"/>
      <circle cx="33" cy="19" r="0.7" fill="#f6f5f1" stroke="none"/>
      <path d="M 32 24 L 34 24" stroke="#f6f5f1" stroke-width="0.8"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="bb" viewBox="0 0 45 45">
    <g fill="#1a1a1a" stroke="#050505" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <circle cx="22.5" cy="9" r="2.5"/>
      <path d="M 16 14 Q 22.5 11.5, 29 14 L 30 18 L 15 18 Z"/>
      <path d="M 15 18 L 30 18 L 32 32 L 13 32 Z"/>
      <path d="M 22.5 19 L 22.5 26" stroke-width="1.5" stroke="#f6f5f1"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="bq" viewBox="0 0 45 45">
    <g fill="#1a1a1a" stroke="#050505" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <circle cx="9" cy="8" r="1.8"/>
      <circle cx="15.5" cy="6" r="1.8"/>
      <circle cx="22.5" cy="5" r="1.8"/>
      <circle cx="29.5" cy="6" r="1.8"/>
      <circle cx="36" cy="8" r="1.8"/>
      <path d="M 9 9 L 13 16 L 15.5 8 L 19 16 L 22.5 7 L 26 16 L 29.5 8 L 32 16 L 36 9 L 34 19 L 11 19 Z"/>
      <path d="M 11 19 L 34 19 L 32 32 L 13 32 Z"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>

  <symbol id="bk" viewBox="0 0 45 45">
    <g fill="#1a1a1a" stroke="#050505" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M 22.5 4 L 22.5 10 M 19.5 7 L 25.5 7" stroke-width="2" stroke="#f6f5f1"/>
      <path d="M 13 17 Q 18 11, 22.5 11 Q 27 11, 32 17 L 33 20 L 12 20 Z"/>
      <path d="M 12 20 L 33 20 L 32 32 L 13 32 Z"/>
      <path d="M 13 25 L 32 25" stroke-width="1.2" stroke="#f6f5f1"/>
      <use href="#ratspeak-chess-base"/>
    </g>
  </symbol>
</svg>
